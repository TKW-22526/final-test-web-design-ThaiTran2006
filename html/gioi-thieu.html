<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm LEGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="detailpage6.css">
</head>
<body>

    <div class="container py-5">
        <div class="row product-detail">
            <div class="col-lg-6">
                <div class="image-box">
                    <img id="product-image" alt="Lego Image">
                </div>
            </div>
            <div class="col-lg-6">
                <div class="info-box">
                    <h1 id="product-name"></h1>
                    <p class="price" id="product-price"></p>
                    <p class="description" id="product-description"></p>
                    
                    <div class="button-group">
                        <button class="cart-btn">🛒 Thêm vào giỏ hàng</button>
                        <button class="buy-btn">⚡ Mua ngay</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="libpage6.js"></script>
    <script src="libdetailpage6.js"></script>
</body>
</html>
