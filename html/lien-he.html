<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - LEGO Shop</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/logo-lego.png" alt="Logo">
                    LEGO SHOP
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Trang Chủ</a></li>
                <li><a href="gioi-thieu.html">Giới Thiệu</a></li>
                <li><a href="lien-he.html" class="active">Liên Hệ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="contact-section">
            <h2>Liên Hệ Với Chúng Tôi</h2>
            <p>Bạn có câu hỏi hoặc cần tư vấn chọn bộ LEGO phù hợp? Hãy gửi tin nhắn cho chúng tôi!</p>
            <form class="contact-form" action="#" method="post">
                <input type="text" placeholder="Họ và tên" required>
                <input type="email" placeholder="Email của bạn" required>
                <textarea rows="5" placeholder="Lời nhắn / Yêu cầu của bạn..." required></textarea>
                <button type="submit">Gửi Tin Nhắn</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cửa Hàng LEGO - Đồ Chơi Sáng Tạo.</p>
    </footer>
    <script src="../js/script.js"></script>
</body>
</html>
